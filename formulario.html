<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>

<body>

    <h1>Cadastro - Teste de Formulario</h1>

    <form>
        <label for="clienteNome">Nome:</label> <br>
        <input type="text" id="clienteNome" name="cadName" placeholder="Insira seu Nome" required
        oninvalid="this.setCustomValidity('Insira um nome válido')"
        oninput="this.setCustomValidity('')">
        <br><br>

        <label for="emailCliente">E-mail:</label> <br>
        <input type="email" id="emailCliente" name="cadEmail" placeholder="Insira seu e-mail" required
        oninvalid="this.setCustomValidity('Insira um e-mail válido')"
        oninput="this.setCustomValidity('')">
        <br><br>

        <label>Senha:</label> <br>
        <input type="password" name="cadSenha" placeholder="Insira sua senha" required minlength="8"
        oninvalid="this.setCustomValidity('Sua senha precisa ter pelo menos 8 caracteres')"
        oninput="this.setCustomValidity('')">
        <br><br>

        <label> Idade: </label><br>
        <input type="number" name="cadNas" id="nascimento" min="18" max="100" placeholder="Idade" required
        oninvalid="this.setCustomValidity('Você precisa ter no minimo 18 anos para se cadastrar')"
        oninput="this.setCustomValidity('')">
        <br><br>

        <label> CEP: </label> <br>
        <input type="text" name="cepCad" id="cep" placeholder="Insira seu CEP" maxlength="9" pattern="[0-9]{5}-[0-9]{3}" required
        oninvalid="this.setCustomValidity('Insira seu CEP corretamente')"
        oninput="this.setCustomValidity('')">
        <br><br>
        
        <label>Número de Telefone:</label><br>
        <input type="number" name="cadTel" id="telefone" placeholder="Insira seu número de telefone" required
        oninvalid="this.setCustomValidity('Insira seu número de telefone')"
        oninput="this.setCustomValidity('')">
        <br><br>

        <label> Gênero: </label><br>
        <input type="radio" name="sexo" value="Feminino" required> Feminino
        <input type="radio" name="sexo" value="Masculino" required> Masculino
        <br><br>

        <label>Como conheceu nosso site? (opcional) </label><br>
        <select name="referencia" id="ref">
            <option>Selecione:</option>
            <option>Anúncio</option>
            <option>Amigos</option>
            <option>Indicação</option>
        </select>

        <br><br>

        <label> O que você procura em nosso site? (opcional) </label> <br>
        <input type="checkbox" name="preferencias"> Adidas <br>
        <input type="checkbox" name="preferencias"> Basquete <br>
        <input type="checkbox" name="preferencias"> Bermudas <br>
        <input type="checkbox" name="preferencias"> Calçados <br>
        <input type="checkbox" name="preferencias"> Camisas <br>
        <input type="checkbox" name="preferencias"> Futebol <br>
        <input type="checkbox" name="preferencias"> Nike <br>
        <input type="checkbox" name="preferencias"> Suplementos <br>

        <br><br>

        <label> Feedbacks: (opcional) </label> <br> <br>
        <textarea name="msg" id="Feedbacks" rows="6" cols="50"></textarea>

        <br><br>


        <input type="submit" value="Enviar">

    </form>

    <a href="index.html"> Volte à página inicial </a> 

    <footer> Teste Footer </footer>

</body>

</html>
